<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>永续合约 · 交易复盘报告</title>
    <link rel="stylesheet" href="templates/style.css">
    <script src="static/trades_dataC_converted_to_me15.txt.js"></script>
</head>
<body>
<div class="container">
    <h1>📊 永续合约交易复盘</h1>
    <div class="subhead">
        <div>
            <span>数据源: me15.txt · 自动解析生成</span>
            <span style="margin-left: 20px;">📅 交易周期: <span id="dateRange">计算中...</span></span>
        </div>
        <span>生成时间: <span id="generateTime"></span></span>
    </div>

    <div class="summary-grid" id="summaryCards"></div>

    <div class="control-bar">
        <div class="view-buttons">
            <button class="view-btn active" id="viewBySymbol">📊 按品种汇总</button>
            <button class="view-btn" id="viewByTime">⏰ 按时间顺序</button>
        </div>
        <div class="filter-buttons">
            <button class="filter-btn active" id="filterAll">全部</button>
            <button class="filter-btn win" id="filterWin">💰 盈利</button>
            <button class="filter-btn loss" id="filterLoss">💸 亏损</button>
        </div>
        <!-- 新增：亏损阈值过滤 -->
        <div class="loss-threshold" style="display: flex; align-items: center; gap: 8px; margin-left: auto;">
        <label for="minLossAmount" style="font-size:0.8rem; white-space: nowrap;">盈亏绝对值 ≥</label>
            <input type="number" id="minLossAmount" value="2" step="0.5" min="0" style="width:70px; padding:4px; border-radius:6px; border:1px solid #dce3ec;">
            <span style="font-size:0.8rem;">USDT</span>
            <button id="applyThreshold" style="padding:4px 12px; border-radius:30px; border:none; background:#1e3a5f; color:white; cursor:pointer; font-size:0.8rem;">应用</button>
        </div>
        <span class="filter-info" id="filterInfo"></span>
        <button class="clear-notes" id="clearAllNotes">🗑️ 清除备注</button>
    </div>

    <div class="table-container" id="tableContainer">
        <!-- 动态渲染表格 -->
    </div>

    <div class="footer-note">
        ⚡ 点击交易行可添加/编辑备注（自动保存到浏览器）<br>
        ⚡ 按品种视图：点击品种行展开详情 | 按时间视图：直接显示所有交易<br>
        ⚡ 阈值过滤：按盈亏绝对值过滤（输入30，显示盈亏≥30或≤-30的交易）
    </div>
</div>

<!-- 备注编辑弹窗 -->
<div id="noteModal" class="modal" style="display: none;">
    <div class="modal-content">
        <h3 id="modalTitle">编辑备注</h3>
        <textarea id="noteText" placeholder="输入备注..."></textarea>
        <div class="modal-buttons">
            <button class="cancel" onclick="closeNoteModal()">取消</button>
            <button class="save" onclick="saveNote()">保存</button>
        </div>
    </div>
</div>

<script src="templates/app.js"></script>
</body>
</html>
